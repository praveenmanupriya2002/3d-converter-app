[build]
  functions = "netlify/functions"
  publish = "build"   # Create React App default build folder (if you use CRA)
  # ඔබ Vite භාවිත කරන්නේ නම් publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200